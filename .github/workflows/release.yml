name: Release

# Triggered by version tags (created via `npm run release:patch|minor|major`).
# Builds the Windows artifacts with Electron Forge and publishes them to a
# GitHub Release named after the tag.
on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Windows artifacts (portable + Squirrel setup)
        run: npm run make

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*.exe
          generate_release_notes: true
